[tool.black]
line-length = 120
target-version = ["py39"]

[tool.mypy]
python_version = "3.9"
ignore_missing_imports = true
warn_return_any = false
warn_unused_configs = true
plugins = ["sqlalchemy.ext.mypy.plugin"]
# SQLAlchemy ORM + Column descriptors produce many false positives
# Suppress the noisiest categories; real bugs still caught by flake8 + tests
disable_error_code = ["arg-type", "return-value", "no-any-return", "union-attr"]

# Storage layer has the densest SQLAlchemy usage
[[tool.mypy.overrides]]
module = "app.promise_engine.storage.*"
disable_error_code = ["arg-type", "return-value", "assignment", "operator", "misc"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-x -q --tb=short"
