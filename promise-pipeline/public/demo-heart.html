<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeartLoader Demo</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3rem;
    background: #0a0a0a;
    font-family: monospace;
  }
  h1 { color: #fff; font-size: 1.2rem; }
  .row { display: flex; gap: 2rem; align-items: end; }

  /* ── animation ── */
  .hl-right { animation: hl-unfold-r 5s ease-in-out infinite; }
  .hl-left  { animation: hl-unfold-l 5s ease-in-out infinite; }
  .hl-pulse {
    animation: hl-beat 5s ease-in-out infinite;
    transform-origin: 240px 320px;
  }

  @keyframes hl-unfold-r {
    0%, 18% {
      transform: translate(70px, 70px) rotate(0deg) scale(1) translate(0px, 0px);
    }
    38%, 68% {
      transform: translate(240px, 420px) rotate(-35deg) scale(0.5) translate(0px, -340px);
    }
    88%, 100% {
      transform: translate(70px, 70px) rotate(0deg) scale(1) translate(0px, 0px);
    }
  }

  @keyframes hl-unfold-l {
    0%, 18% {
      transform: translate(240px, 420px) rotate(0deg) scale(0.001) translate(-340px, -340px);
      opacity: 0;
    }
    38%, 68% {
      transform: translate(240px, 420px) rotate(35deg) scale(0.5) translate(-340px, -340px);
      opacity: 1;
    }
    88%, 100% {
      transform: translate(240px, 420px) rotate(0deg) scale(0.001) translate(-340px, -340px);
      opacity: 0;
    }
  }

  @keyframes hl-beat {
    0%, 40%, 62%, 100% { transform: scale(1); }
    47% { transform: scale(1.07); }
    50% { transform: scale(1); }
    55% { transform: scale(1.05); }
    58% { transform: scale(1); }
  }
</style>
</head>
<body>

        <path d="M 0,340 L 0,0 L 200,0 C 340,0 340,280 200,280 L 60,280 L 60,340 Z" fill="#7b41d6" transform="scale(0.236)"/>
        <path d="M 0,340 L 0,0 L 200,0 C 340,0 340,280 200,280 L 60,280 L 60,340 Z" fill="#c93b3b" transform="scale(0.146)"/>
      </g>
      <g class="hl-left">
